name: Flutter Build APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch: # Cho phép chạy thủ công từ tab Actions trên GitHub

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    permissions:
      contents: write # Quan trọng: Cho phép Action tạo Release và đẩy file lên

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK (Split per ABI)
        run: |
          # Tính toán build number từ run_number của GitHub
          # Giả sử bắt đầu từ 1.0.0, mỗi lần build sẽ tăng version: 1.0.<run_number>
          BUILD_NAME="1.0.${{ github.run_number }}"
          BUILD_NUMBER="${{ github.run_number }}"
          flutter build apk --release --split-per-abi \
            --build-name=$BUILD_NAME \
            --build-number=$BUILD_NUMBER \
            --dart-define=GH_TOKEN=${{ secrets.GH_TOKEN }}

      - name: Generate Release Tag
        id: tag
        run: echo "tag_name=v1.0.${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Create Release and Upload APKs
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag_name }}
          name: Release ${{ steps.tag.outputs.tag_name }}
          files: build/app/outputs/flutter-apk/*.apk
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
